# PostgreSQL数据库配置
spring:
  application:
    name: opendeepwiki

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/koalawiki?currentSchema=public
    username: postgres
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: KoalaWikiHikariCP

  jpa:
    database: POSTGRESQL
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL12Dialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_updates: true
        order_inserts: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    encoding: UTF-8
    table: flyway_schema_history
    sql-migration-suffixes: .sql
    placeholder-replacement: false

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /

# 日志配置
logging:
  level:
    root: INFO
    ai.opendw.koalawiki: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.springframework.web: INFO
    org.flywaydb: DEBUG

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,flyway
  endpoint:
    health:
      show-details: always

# Git配置
koalawiki:
  git:
    storage-path: ${GIT_STORAGE_PATH:/data/koalawiki/git}
    max-depth: 0
    timeout: 300000
    cache-cleanup-days: 30

# AI配置
  ai:
    enabled: ${AI_ENABLED:true}
    provider: openai
    api-key: ${OPENAI_API_KEY:}
    api-endpoint: ${OPENAI_API_ENDPOINT:https://api.openai.com/v1}
    chat-model: ${CHAT_MODEL:gpt-4-turbo-preview}
    analysis-model: ${ANALYSIS_MODEL:gpt-4-turbo-preview}
    timeout: 60000
    max-retries: 3
    retry-delay: 1000
    cache:
      enabled: true
      ttl: 3600
      max-size: 1000
    test-on-startup: ${AI_TEST_ON_STARTUP:false}
