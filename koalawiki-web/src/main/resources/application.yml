# MySQL数据库配置
spring:
  application:
    name: opendeepwiki

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/koalawiki?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: KoalaWikiHikariCP

  jpa:
    database: MYSQL
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_updates: true
        order_inserts: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    clean-disabled: false
    encoding: UTF-8
    table: flyway_schema_history
    sql-migration-suffixes: .sql
    placeholder-replacement: false

# 服务器配置
server:
  port: 18081
  servlet:
    context-path: /

# 日志配置
logging:
  level:
    root: INFO
    ai.opendw.koalawiki: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.springframework.web: INFO
    org.flywaydb: DEBUG

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,flyway
  endpoint:
    health:
      show-details: always

# Git配置
koalawiki:
  git:
    storage-path: ${GIT_STORAGE_PATH:./data/git}
    max-depth: 0
    timeout: 300000
    cache-cleanup-days: 30
    # Git默认凭据配置（用于未配置用户名密码的仓库）
    default-username: ${GIT_DEFAULT_USERNAME:}
    default-password: ${GIT_DEFAULT_PASSWORD:}

  # AI配置
  ai:
    enabled: ${AI_ENABLED:true}
    provider: openai
    api-key: ${OPENAI_API_KEY:}
    api-endpoint: ${OPENAI_API_ENDPOINT:https://api.openai.com/v1}
    chat-model: gpt-5.1
    analysis-model: gpt-5.1-high
    timeout: 600000
    max-retries: 3
    retry-delay: 1000
    cache:
      enabled: true
      ttl: 3600
      max-size: 1000
    test-on-startup: ${AI_TEST_ON_STARTUP:false}

  # 仓库同步配置
  sync:
    enabled: true               # 是否启用自动同步
    cron: "0 0 */6 * * ?"      # 同步任务执行时间(默认每6小时)
    batch-size: 10             # 每批处理的仓库数量
    max-concurrent: 3          # 最大并发同步数

  # 文档自动生成配置
  doc:
    auto-generate: true        # 是否在仓库同步完成后自动生成文档
    agent-type: claude         # 默认使用的AI代理类型

# AI Agent配置
ai:
  # CLI命令路径
  cli:
    claude: claude

  # 超时时间(毫秒)
  timeout: 600000
